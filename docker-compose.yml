version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai_resume_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai_resume_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/analyze
    depends_on:
      - backend
    restart: unless-stopped
